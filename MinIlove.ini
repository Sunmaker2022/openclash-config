# 手动选择
custom_proxy_group=🐸 手动切换`select`.*

# AI 节点
custom_proxy_group=🤖 AI节点`select`(?=.*(AI|Ai|ai|GPT|ChatGPT|Claude|Gemini|OpenAI|Copilot|Grok|Perplexity|Cursor|DeepSeek|Kimi|Qwen|GLM|智谱|豆包))

# 便宜节点（0.1 倍）
custom_proxy_group=🕊️ 便宜节点`select`(?=.*(0\.[1-9]|0\.[1-9]倍|0\.[1-9]x))

# 香港节点
